version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"

  locust:
    image: locustio/locust
    ports:
      - "8089:8089"
    volumes:
      - ./locustfile.py:/mnt/locust/locustfile.py
    command: -f /mnt/locust/locustfile.py --host http://api:8000
    depends_on:
      - api